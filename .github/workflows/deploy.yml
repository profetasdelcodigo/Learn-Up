name: 🚀 Deploy to Render

on:
  push:
    branches:
      - main # deploy on every push to main
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  lint-and-type-check:
    name: ✅ Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "learn-up/package-lock.json"

      - name: Install dependencies
        working-directory: learn-up
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        working-directory: learn-up
        run: npx tsc --noEmit

  deploy:
    name: 🌐 Deploy to Render
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
        # ↑ Add RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets and variables → Actions
        # Get the deploy hook URL from: Render Dashboard → Your Service → Settings → Deploy Hooks
