# Redis: An in-memory data store used here to hold the session-to-pod-IP mapping.
# When a user starts a session, the gateway records which agent pod is handling it
# in Redis. On subsequent requests, the gateway looks up the mapping so it knows
# where to route traffic. The PersistentVolumeClaim ensures data survives pod
# restarts.
#
# A NetworkPolicy at the bottom of this file limits who can talk to Redis: only
# the gateway. It runs without AUTH/TLS here because it only ever holds routing
# metadata and is unreachable from anything except the gateway — enable AUTH if
# you put anything more sensitive in it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: redis
    namespace: claude-agent
spec:
    replicas: 1
    selector:
        matchLabels:
            app: redis
    template:
        metadata:
            labels:
                app: redis
        spec:
            containers:
                - name: redis
                  image: redis:7-alpine
                  command: ["redis-server", "--appendonly", "yes"]
                  ports:
                      - containerPort: 6379
                  volumeMounts:
                      - name: redis-data
                        mountPath: /data
            volumes:
                - name: redis-data
                  persistentVolumeClaim:
                      claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
    name: redis
    namespace: claude-agent
spec:
    type: ClusterIP
    selector:
        app: redis
    ports:
        - port: 6379
          targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: redis-pvc
    namespace: claude-agent
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 1Gi
---
# Only the gateway may connect to Redis. Agent pods are already blocked by
# their own egress policy (network-policy.yaml), but without this rule any
# *other* pod that lands in the namespace could read or rewrite the
# session → pod-IP routing table.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: redis-ingress-policy
    namespace: claude-agent
spec:
    podSelector:
        matchLabels:
            app: redis
    policyTypes:
        - Ingress
    ingress:
        - from:
              - podSelector:
                    matchLabels:
                        app: gateway
          ports:
              - protocol: TCP
                port: 6379
